services:
  api:
    build: api/
    ports:
      - "8099:8099"
    volumes:
      - ./api/config.yaml:/app/config.yaml
      - ./api/data:/app/data
      - ./api/cloud-data:/app/cloud-data
    restart: unless-stopped
    network_mode: host

